# LAN listener for ESP32 devices on the farm Wi-Fi.
# Mosquitto 2.x defaults to localhost-only when no listener is configured.
listener 1883 0.0.0.0
allow_anonymous true

# Publish broker connect/disconnect logs to $SYS/broker/log/# so Device Hub can
# persist MQTT connection history to Turso.
log_dest topic
connection_messages true
